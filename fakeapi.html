<!DOCTYPE html>
<html>
<head>
    <title>Jason Shop</title>

    <style>
        body{
            font-family: Arial;
            background-color:brown;

        }

        #container{
            display: flex;
            flex-wrap: wrap;
        }

        .card{
            width:300px;
            border:1px dashed black;
            margin:10px;
            padding:10px;
            background-color:burlywood ;
            /* transition: height 10s ; */
        }

        .card img{
            width:100%;
            height:150px;
        }
        .card :hover{
            height: 350px;


        }
        h1{
            text-align: center;
        }
        #hide{
            display: hidden;
        }
    </style>
</head>
<body>

<h1>Welcome to Jason Shop!!!</h1>

<div id="container"></div>

<script>

fetch("https://fakestoreapi.com/products")
    .then(res => res.json())
    .then(data => {
        console.log(data);
        displayDOM(data);  
    })
    .catch(err => console.log(err));

function displayDOM(arr){
    let box = document.querySelector("#container");
    box.innerHTML = arr.map(item => {
    return `
      <div class="card">
        <img src="${item.image}" />
        <h3>${item.title}</h3>
        <p>Price: ₹${item.price}</p>
        <p>Category: ${item.category}</p>
      </div>
    `;
  })
  .join("");


}

</script>

</body>
</html>
