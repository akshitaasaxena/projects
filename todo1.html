<!DOCTYPE html>
<html>
<head>
    <title>Simple To-Do</title>

    <style>
        body {
            font-family: Arial;
            background-color: cornflowerblue;
            padding: 40px;
            text-align: center;
        }

        input {
            padding: 10px;
            width: 200px;
            border-radius: 8px;
            border: 2px solid #cfcfff;
        }

        button {
            padding: 10px 15px;
            border: none;
            background: #6767ff;
            color: white;
            border-radius: 8px;
            cursor: pointer;
        }

        li {
            list-style: none;
            padding: 4px;
            margin-top: 10px;
            border-radius: 8px;
            width: 260px;
            margin-left: auto;
            margin-right: auto;
            display: flex;
            justify-content: space-between;
        }

        .deleteBtn {
            background:none;
            color: crimson;
            border: 2px solid black;
            padding: 5px;
            border-radius: 6px;
        }
        main{
            background-color: blanchedalmond;
            height: 50vh;
            width: 60vw;
            text-align: center;
            border-radius: 25px;
            padding-top: 5px;
        
        }
    </style>
</head>

<body>

    <main>
          <h2>To-Do List</h2>

    <input id="inp" type="text" placeholder="Task">
    <button id="addBtn">Add</button>

    <ul id="list"></ul>

    </main>
  

    <script>
        document.querySelector("#addBtn").addEventListener("click", function () {

            let value = document.querySelector("#inp").value;

            if (value === "" || value === " ") {
                alert("Please enter something");
            }

            let li = document.createElement("li");

        
            li.innerHTML = value + " <button class='deleteBtn'>X</button>";

           
            li.querySelector("button").addEventListener("click", function () {
                li.remove();
            });

            document.querySelector("#list").appendChild(li);

            document.querySelector("#inp").value = "";
        });
    </script>

</body>
</html>
